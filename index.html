<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ahmed</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Georgia, serif;
}

body{
    background-image: url("5773e8d5afbbcce43d9ccdb5c9b7da94.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden; 
}

.logo{
    position:absolute;
    top:20px;
    left:25px;
    font-size:48px;
    font-weight:900;
    color:#e0aaff;
    font-family:Georgia, serif;
    text-shadow:
        0 0 10px #c77dff,
        0 0 25px #9d4edd,
        0 0 40px #7b2cbf;
}

.message{
position:absolute;
text-align:center;
opacity:0;
animation:show 2s forwards;
animation-delay:3s;
}

.message h1{
color:white;
font-size:45px;
}

.message p{
color:#ddd;
font-size:22px;
margin-top:15px;
}

@keyframes zoom{
0%{
transform:scale(0.1);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

@keyframes show{
to{
opacity:1;
}
}
</style>

</head>

<body>

<div class="logo">KSJ_M☆</div>
<div class="message">
<h1>🎉 Happy Birthday Ahmed! 🎉</h1>

<p>Wishing you endless happiness,<br>
good health, success,<br>
and an unforgettable year ahead! ❤️</p>

</div>

</body>
</html>

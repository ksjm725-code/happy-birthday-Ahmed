<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ahmed</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.netflix{
font-size:70px;
font-weight:bold;
color:#e50914;
animation:zoom 3s forwards;
text-shadow:0 0 25px #ff0000;
}

.message{
position:absolute;
text-align:center;
opacity:0;
animation:show 2s forwards;
animation-delay:3s;
}

.message h1{
color:white;
font-size:45px;
}

.message p{
color:#ddd;
font-size:22px;
margin-top:15px;
}

@keyframes zoom{
0%{
transform:scale(0.1);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

@keyframes show{
to{
opacity:1;
}
}
</style>

</head>

<body>

<div class="netflix">N</div>

<div class="message">
<h1>🎉 Happy Birthday Ahmed! 🎉</h1>

<p>Wishing you endless happiness,<br>
good health, success,<br>
and an unforgettable year ahead! ❤️</p>

</div>

</body>
</html>
